# Text-to-Speech Configuration

# Model options: gpt-4o-mini-tts, tts-1, tts-1-hd
model: gpt-4o-mini-tts

# Voice options (gpt-4o-mini-tts): alloy, ash, ballad, coral, echo, fable, nova, onyx, sage, shimmer, verse, marin, cedar
# Voice options (tts-1 / tts-1-hd): alloy, ash, coral, echo, fable, onyx, nova, sage, shimmer
# Recommended: marin, cedar
voice: coral

# Output format: mp3, opus, aac, flac, wav, pcm
output_format: mp3

# Output directory for generated audio files
output_dir: ./output

# Instructions for how the voice should speak (only works with gpt-4o-mini-tts)
# Examples: "Speak in a cheerful and positive tone.", "Whisper softly.", "Speak with a British accent."
instructions: "Speak clearly and naturally."
